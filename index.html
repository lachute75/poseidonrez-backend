<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoséidonRez</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <!-- 🔱 LOGO -->
    <div class="logo">🔱</div>

    <!-- TITRE -->
    <div class="title">PoséidonRez</div>

    <!-- 💰 SOLDE -->
    <div class="box solde">
      💰 Solde : 120€
    </div>

    <!-- 📋 LISTE / 🎧 MIX -->
    <div class="box row">
      <div class="btn-box">📋 Liste</div>
      <div class="btn-box">🎧 Mix</div>
    </div>

    <!-- 🔎 FILTRER -->
    <div class="box">
      🔎 Filtrer
    </div>

    <!-- 🛍️ PRODUITS (DYNAMIQUE JS) -->
    <div id="products"></div>

    <!-- 🛒 PANIER -->
    <div class="box" id="cartBox">
      🛒 Panier vide
    </div>

    <!-- 📦 COMMANDER -->
    <button class="box" onclick="checkout()">
      Commander 📦
    </button>

  </div>

  <!-- 📱 NAVBAR -->
  <div class="navbar">
    <div class="nav-item">🏠 Accueil</div>
    <div class="nav-item">🛒 Panier</div>
    <div class="nav-item">📦 Commande</div>
    <div class="nav-item">⚡ Préco</div>
  </div>

  <!-- ⚙️ JS -->
  <script src="app.js"></script>

</body>
</html>
